services:
  aws-cli:
    image: amazon/aws-cli:latest
    working_dir: /workspace
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - .:/workspace
    env_file:
      - .env

  terraform:
    image: hashicorp/terraform:1.12
    working_dir: /workspace
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - .:/workspace
    env_file:
      - .env
